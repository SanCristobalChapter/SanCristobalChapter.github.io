<!DOCTYPE html>
<html>
<head>
  <title>Personal Digital ID</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
  body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background-image: url('https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/TGP%20SEAL%20PICTURE/San%20Cristobal%20Seal.png?raw=true');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }

  .card {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    margin: 80px auto;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
  }

  img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
  }
    .bottom-img {
  width: 100%;
  margin-top: 15px;
  border-radius: 10px;
}
    .extra-img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
    /* Clickable image */
.clickable-img {
  width: 120px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.clickable-img:hover {
  transform: scale(1.05);
}

/* Modal background */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 80px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}

/* Enlarged image */
.modal-content {
  margin: auto;
  display: block;
  width: 80%;
  max-width: 500px;
  border-radius: 10px;
}

/* Close button */
.close {
  position: absolute;
  top: 20px;
  right: 40px;
  color: white;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="members"></div>

<script>

// MEMBERS DATABASE
const members = [
  {
    id: "M001",
    name: "Arbhin John Stroller Uy",
    photo: "https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/AJ%20Picture/FB_IMG_1728008858003.jpg?raw=true",
    extraPhotos: [
      "https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/AJ%20Picture/received_841651617329281.jpeg?raw=true",
      "https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/AJ%20Picture/received_928791195623983.jpeg?raw=true"
       "https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/AJ%20Picture/FB_IMG_1728008858003.jpg?raw=true",
    ],
    root: "SAN CRISTOBAL",
    ir: "October 17 2010",
    gt: "Jay Christian Paz",
    mi: "Reggie Simbajon",
    cm: "Arven Bagos"
  },
  {
    id: "M002",
    name: "John Doe",
    photo: "photo2.jpg",
    root: "MANILA",
    ir: "March 15 2015",
    gt: "Michael Cruz",
    mi: "Peter Ramos",
    cm: "Daniel Reyes"
  }
];

// VERIFICATION SYSTEM
const container = document.getElementById("members");
const params = new URLSearchParams(window.location.search);
const memberID = params.get("member");

if (!memberID) {

  container.innerHTML = `
    <div class="card">
      <h2>📷 Scan Membership QR Code</h2>
    </div>
  `;

} else {

  const member = members.find(m => m.id === memberID);

  if (!member) {

    container.innerHTML = `
      <div class="card">
        <h2 style="color:red;">❌ MEMBER NOT VALID</h2>
      </div>
    `;

  } else {

    showMember(member);

  }
}

// SHOW MEMBER
function showMember(member) {

  const statusText = `<h3 style="color:green;">🟢 VERIFIED MEMBER</h3>`;

  const card = document.createElement("div");
  card.className = "card";

  // Build extra photos
  let extraImagesHTML = "";
  if (member.extraPhotos) {
    member.extraPhotos.forEach(photo => {
      extraImagesHTML += `<img src="${photo}" class="extra-img clickable-img">`;
    });
  }

  card.innerHTML = `
      <img src="${member.photo}" class="clickable-img">
      <h2>${member.name}</h2>
      <p><strong>Member ID:</strong> ${member.id}</p>
      <p>Root Chapter : ${member.root}</p>
      <p>I.R Date : ${member.ir}</p>
      <p>GT : ${member.gt}</p>
      <p>MI : ${member.mi}</p>
      <p>CM During IR : ${member.cm}</p>
      ${statusText}
      ${extraImagesHTML}
      <div id="qr-${member.id}"></div>
  `;

  container.appendChild(card);

  const qrLink =
    window.location.origin +
    window.location.pathname +
    "?member=" +
    member.id;

  new QRCode(document.getElementById(`qr-${member.id}`), {
      text: qrLink,
      width: 100,
      height: 100
  });
}

// IMAGE CLICK FUNCTION (GLOBAL)
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("clickable-img")) {
    document.getElementById("imgModal").style.display = "block";
    document.getElementById("modalImg").src = e.target.src;
  }
});

document.querySelector(".close").onclick = function() {
  document.getElementById("imgModal").style.display = "none";
};

</script>
<!-- IMAGE MODAL -->
<div id="imgModal" class="modal">
  <span class="close">&times;</span>
  <img class="modal-content" id="modalImg">
</div>
</body>
</html>
