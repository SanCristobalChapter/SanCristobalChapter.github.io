<!DOCTYPE html>
<html>
<head>
  <title>Personal Digital ID</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    .card {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    img { width: 120px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="card">
    <img src="yourphoto.jpg" alt="Photo">
    <h2>Your Name</h2>
    <p>ID: 123456</p>
    <p>Email: your@email.com</p>
  </div>
</body>
</html>
