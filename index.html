<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <title>Personal Digital ID</title>
  <style>
    body { font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #4facfe, #00f2fe); }
    .card {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    img { width: 120px; border-radius: 50%; }
     /* Gallery styling */
.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 30px;
}

.gallery img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid #ccc;
  transition: transform 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* Lightbox styling */
#lightbox {
  display: none;
  position: fixed;
  z-index: 10000;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

#close {
  position: absolute;
  top: 20px;
  right: 40px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

  </style>
 <style>
  body {
    font-family: Arial;
    text-align: center;
    background: url('https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/TGP%20SEAL%20PICTURE/San%20Cristobal%20Seal.png?raw=true') no-repeat center center;
    background-size: cover;
    background-position: center;
  }
  </style>
</head>
<body>
  <body>

<div id="members"></div>

<div class="gallery">
  <img class="gallery-item" src="https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/TGP%20SEAL%20PICTURE/CCTC%20Seal.png?raw=true">
  <img class="gallery-item" src="https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/TGP%20SEAL%20PICTURE/Tau_Gamma_Phi_seal%20(1).png?raw=true">
  <img class="gallery-item" src="https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/TGP%20SEAL%20PICTURE/San%20Cristobal%20Seal.png?raw=true">
</div>

<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
const members = [
  {
    id: "M001",
    name: "Arbhin John Stroller Uy",
    photo: "https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/Capture.PNG?raw=true",
    root: "SAN CRISTOBAL",
    ir: "October 17 2010",
    gt: "Jay Christian Paz",
    mi: "Reggie Simbajon",
    cm: "Arven Bagos"
  },
  {
    id: "M002",
    name: "John Doe",
    photo: "photo2.jpg",
    root: "MANILA",
    ir: "March 15 2015",
    gt: "Michael Cruz",
    mi: "Peter Ramos",
    cm: "Daniel Reyes"
  }
];

const container = document.getElementById("members");

members.forEach(member => {

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
      <img src="${member.photo}">
      <h2>${member.name}</h2>
      <p>Member ID : ${member.id}</p>
      <p>Root Chapter : ${member.root}</p>
      <p>I.R Date : ${member.ir}</p>
      <p>GT : ${member.gt}</p>
      <p>MI : ${member.mi}</p>
      <p>CM During IR : ${member.cm}</p>
      <div id="qr-${member.id}"></div>
  `;

  container.appendChild(card);

  new QRCode(document.getElementById(`qr-${member.id}`), {
      text: window.location.origin + window.location.pathname + "?member=" + member.id,
      width: 100,
      height: 100
  });

});

// Lightbox Fix
const galleryItems = document.querySelectorAll('.gallery-item');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

galleryItems.forEach(item => {
  item.addEventListener('click', () => {
    lightbox.style.display = 'flex';
    lightboxImg.src = item.src;
  });
});

lightbox.addEventListener('click', () => {
  lightbox.style.display = 'none';
});
</script>

</body>
</script>
