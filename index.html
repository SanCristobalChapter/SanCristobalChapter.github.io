<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <title>Personal Digital ID</title>
  <style>
    body { font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #4facfe, #00f2fe); }
    .card {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    img { width: 120px; border-radius: 50%; }
     /* Gallery styling */
.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 30px;
}

.gallery img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid #ccc;
  transition: transform 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* Lightbox styling */
#lightbox {
  display: none;
  position: fixed;
  z-index: 10000;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

#close {
  position: absolute;
  top: 20px;
  right: 40px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

  </style>
 <style>
  body {
    font-family: Arial;
    text-align: center;
    background: url('https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/TGP%20SEAL%20PICTURE/San%20Cristobal%20Seal.png?raw=true') no-repeat center center;
    background-size: cover;
    background-position: center;
  }
  </style>
</head>
<body>

<div id="members"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

// ===============================
// MEMBERS DATABASE (UNLIMITED)
// ===============================

const members = [
  {
    id: "M001",
    name: "Arbhin John Stroller Uy",
    photo: "https://github.com/SanCristobalChapter/SanCristobalChapter.github.io/blob/main/Capture.PNG?raw=true",
    root: "SAN CRISTOBAL",
    ir: "October 17 2010",
    gt: "Jay Christian Paz",
    mi: "Reggie Simbajon",
    cm: "Arven Bagos",
    expiry: "2026-12-31"
  },
  {
    id: "M002",
    name: "John Doe",
    photo: "photo2.jpg",
    root: "MANILA",
    ir: "March 15 2015",
    gt: "Michael Cruz",
    mi: "Peter Ramos",
    cm: "Daniel Reyes",
    expiry: "2025-05-01"
  }
];

// ===============================
// VERIFICATION SYSTEM
// ===============================

const container = document.getElementById("members");

// Read ?member=M001
const params = new URLSearchParams(window.location.search);
const memberID = params.get("member");

if (!memberID) {

  container.innerHTML = `
    <div class="card">
      <h2>📷 Scan Membership QR Code</h2>
    </div>
  `;

} else {

  const member = members.find(m => m.id === memberID);

  if (!member) {

    container.innerHTML = `
      <div class="card">
        <h2 style="color:red;">❌ MEMBER NOT VALID</h2>
      </div>
    `;

  } else {

    showMember(member);

  }
}

// ===============================
// SHOW VERIFIED MEMBER
// ===============================

function showMember(member) {

  const today = new Date();
  const expiryDate = new Date(member.expiry);

  const isExpired = today > expiryDate;

  const statusText = isExpired
    ? `<h3 style="color:red;">🔴 MEMBERSHIP EXPIRED</h3>`
    : `<h3 style="color:green;">🟢 VERIFIED ACTIVE MEMBER</h3>`;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
      <img src="${member.photo}">
      <h2>${member.name}</h2>
      <p><strong>Member ID:</strong> ${member.id}</p>
      <p>Root Chapter : ${member.root}</p>
      <p>I.R Date : ${member.ir}</p>
      <p>GT : ${member.gt}</p>
      <p>MI : ${member.mi}</p>
      <p>CM During IR : ${member.cm}</p>
      <p><strong>Valid Until:</strong> ${member.expiry}</p>
      ${statusText}
      <div id="qr-${member.id}"></div>
  `;

  container.appendChild(card);

  // Generate unique QR
  const qrLink =
    window.location.origin +
    window.location.pathname +
    "?member=" +
    member.id;

  new QRCode(document.getElementById(`qr-${member.id}`), {
      text: qrLink,
      width: 100,
      height: 100
  });
}

</script>

</body>
</script>
